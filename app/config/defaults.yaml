# AMA-RT default configuration (Phase 1 - Safety Foundation).
#
# These values are loaded by app/config/settings.py and validated against the
# Pydantic schema in app/config/schema.py. Any environment variables prefixed
# with AMA_ override the matching key. Phase 1 hard-codes the four safety
# flags below to their safe values regardless of input.

mode:
  trading_mode: paper            # paper | live_limited | live  (Phase 1: forced to paper)
  live_trading_enabled: false    # Phase 1: forced false
  right_tail_enabled: false      # Phase 1: forced false
  llm_enabled: false             # Phase 1: forced false
  exchange_live_order_enabled: false  # Phase 1: forced false

logging:
  level: INFO

database:
  data_dir: ./data
  sqlite_subdir: sqlite
  wal_mode: true

exchange:
  # Phase 1 does NOT instantiate any real exchange client.
  name: binance
  market_type: usdt_perpetual
  symbols_limit: 200
  isolated_margin_only: true
  cross_margin_allowed: false

telegram:
  # Phase 1 ships an in-process command center skeleton only.
  # ``enabled`` controls whether the in-process command-bus is
  # wired into the boot drill (it never opens a real socket).
  # ``outbound_enabled`` is the SEPARATE real-HTTP gate; Phase 11C
  # locks it False at the schema layer regardless of ``enabled``.
  enabled: false
  outbound_enabled: false
  command_confirm_required:
    resume: true
    change_config: true
    kill_all: false

llm:
  # Phase 1 does NOT call any LLM provider.
  provider: deepseek
  enabled: false
  max_calls_per_hour: 100
  allow_trade_decision: false

capital:
  # Phase 8 Capital Flow Engine configuration.
  # initial_capital is set per-deployment via environment or secrets.
  initial_capital: 100.0
  currency: USDT
  # Profit harvest suggestion thresholds
  harvest_suggest_at_2x: true
  harvest_suggest_at_5x: true
  harvest_suggest_at_10x: true

market_data:
  # Phase 11C - Public-market read-only ingestion.
  #
  # Phase 11C connects to Binance USDT-M perpetual futures public
  # market endpoints ONLY (no API key, no signature, no account /
  # order / position / leverage / margin endpoint). The runner
  # refuses to start if any flag below is changed in a way that
  # would imply a private endpoint is being called.
  provider: binance_public           # only allowed value in Phase 11C
  enabled: true
  read_only: true                    # MUST stay true in Phase 11C
  symbol_limit: 20                   # 20 symbols on a 2C/4G VPS by default
  symbols_mode: top_usdt_perpetual   # top USDT-M perpetual contracts by 24h vol
  rest_base_url: https://fapi.binance.com
  websocket_enabled: true            # accepted as a future-capability hook
  rest_enabled: true
  depth_enabled: true
  trades_enabled: true
  klines_enabled: true
  funding_enabled: true
  open_interest_enabled: true
  mark_price_enabled: true
  book_ticker_enabled: true
  max_ws_staleness_ms: 3000
  max_rest_latency_ms: 2000
  reconnect_backoff_seconds: 5
  rest_poll_interval_seconds: 5.0
  snapshot_interval_seconds: 5.0
  request_timeout_seconds: 5.0
  explicit_symbols: []               # leave empty to use top_usdt_perpetual

safety:
  # Phase 11C - hard safety assertions (the runner refuses to start
  # if any of these are flipped to false).
  forbid_private_credentials: true
  forbid_signed_endpoints: true
  forbid_trade_endpoints: true
  forbid_account_endpoints: true
  forbid_position_endpoints: true
  forbid_leverage_endpoints: true
  forbid_margin_endpoints: true
  forbid_live_trading: true
  forbid_right_tail: true
  forbid_llm_trade_decisions: true
  forbid_telegram_outbound: true
