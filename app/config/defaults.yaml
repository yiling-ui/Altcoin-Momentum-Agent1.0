# AMA-RT default configuration (Phase 1 - Safety Foundation).
#
# These values are loaded by app/config/settings.py and validated against the
# Pydantic schema in app/config/schema.py. Any environment variables prefixed
# with AMA_ override the matching key. Phase 1 hard-codes the four safety
# flags below to their safe values regardless of input.

mode:
  trading_mode: paper            # paper | live_limited | live  (Phase 1: forced to paper)
  live_trading_enabled: false    # Phase 1: forced false
  right_tail_enabled: false      # Phase 1: forced false
  llm_enabled: false             # Phase 1: forced false
  exchange_live_order_enabled: false  # Phase 1: forced false

logging:
  level: INFO

database:
  data_dir: ./data
  sqlite_subdir: sqlite
  wal_mode: true

exchange:
  # Phase 1 does NOT instantiate any real exchange client.
  name: binance
  market_type: usdt_perpetual
  symbols_limit: 200
  isolated_margin_only: true
  cross_margin_allowed: false

telegram:
  # Phase 1 ships an in-process command center skeleton only.
  # ``enabled`` controls whether the in-process command-bus is
  # wired into the boot drill (it never opens a real socket).
  # ``outbound_enabled`` is the SEPARATE real-HTTP gate; Phase 11C
  # locks it False at the schema layer regardless of ``enabled``.
  enabled: false
  outbound_enabled: false
  command_confirm_required:
    resume: true
    change_config: true
    kill_all: false

llm:
  # Phase 1 does NOT call any LLM provider.
  provider: deepseek
  enabled: false
  max_calls_per_hour: 100
  allow_trade_decision: false

capital:
  # Phase 8 Capital Flow Engine configuration.
  # initial_capital is set per-deployment via environment or secrets.
  initial_capital: 100.0
  currency: USDT
  # Profit harvest suggestion thresholds
  harvest_suggest_at_2x: true
  harvest_suggest_at_5x: true
  harvest_suggest_at_10x: true

market_data:
  # Phase 11C - Public-market read-only ingestion.
  #
  # Phase 11C connects to Binance USDT-M perpetual futures public
  # market endpoints ONLY (no API key, no signature, no account /
  # order / position / leverage / margin endpoint). The runner
  # refuses to start if any flag below is changed in a way that
  # would imply a private endpoint is being called.
  #
  # Phase 11C.1A defaults are conservative because the gateway hit
  # HTTP 429 / 418 the first time it ran against the real exchange
  # at the original (symbol_limit=20, rest_poll_interval=5s) cadence.
  # The Phase 11C.1A governor (app/exchanges/binance_rate_limit.py)
  # protects from the worst case; the lower defaults below give that
  # governor extra headroom on a 2C/4G VPS.
  provider: binance_public           # only allowed value in Phase 11C
  enabled: true
  read_only: true                    # MUST stay true in Phase 11C
  symbol_limit: 5                    # Phase 11C.1A: 5 symbols (was 20)
  symbols_mode: top_usdt_perpetual   # top USDT-M perpetual contracts by 24h vol
  rest_base_url: https://fapi.binance.com
  websocket_enabled: true            # accepted as a future-capability hook
  rest_enabled: true
  depth_enabled: true
  trades_enabled: true
  klines_enabled: true
  funding_enabled: true
  open_interest_enabled: true
  mark_price_enabled: true
  book_ticker_enabled: true
  max_ws_staleness_ms: 3000
  max_rest_latency_ms: 2000
  reconnect_backoff_seconds: 5
  rest_poll_interval_seconds: 60.0   # Phase 11C.1A: 60s (was 5s)
  snapshot_interval_seconds: 5.0
  request_timeout_seconds: 5.0
  explicit_symbols: []               # leave empty to use top_usdt_perpetual
  # Phase 11C.1A - Binance public REST rate-limit governor.
  rest_governor:
    enabled: true
    weight_budget_per_minute: 300    # half of Binance's 1200/min budget
    soft_weight_ratio: 0.50          # warn at >=150 weight in window
    hard_weight_ratio: 0.75          # refuse at >=225 weight in window
    retry_after_default_seconds: 300 # used when Retry-After is missing
    on_429: backoff                  # PR-A: only supported value
    on_418: shutdown                 # PR-A: only supported value
    candidate_detail_limit: 3        # max candidates per loop for detail REST
    rest_layering_enabled: true      # bootstrap-only public REST

safety:
  # Phase 11C - hard safety assertions (the runner refuses to start
  # if any of these are flipped to false).
  forbid_private_credentials: true
  forbid_signed_endpoints: true
  forbid_trade_endpoints: true
  forbid_account_endpoints: true
  forbid_position_endpoints: true
  forbid_leverage_endpoints: true
  forbid_margin_endpoints: true
  forbid_live_trading: true
  forbid_right_tail: true
  forbid_llm_trade_decisions: true
  forbid_telegram_outbound: true


label_queue_runtime:
  # Phase 11C.1C-C-A - MFE / MAE Label Queue Runtime & Tail Outcome
  # Tracking. The runtime starts a paper / virtual label-tracking
  # record per ACTIVE candidate, advances per-window MFE / MAE on
  # every fresh price tick, and assigns a rule-based tail label when
  # each window completes.
  #
  # Phase 11C.1C-C-A boundary: this section is paper / virtual only.
  # Nothing under it can flip a Phase 1 safety flag, open a private
  # API socket, or call an LLM / Telegram outbound. Strategy
  # validation conclusions are reserved for the future Strategy
  # Validation Lab.
  enabled: true
  max_pending_records: 500
  grace_period_seconds: 300                  # 5 min after the 4h window
  primary_window_for_tail_label: "5m"
  window_seconds_map:
    "5m": 300
    "15m": 900
    "30m": 1800
    "1h": 3600
    "4h": 14400
  # Tail-label thresholds (configurable; rule-based; no LLM).
  strong_tail_min_r_multiple: 5.0
  strong_tail_max_mae_pct: -0.04
  moderate_tail_min_r_multiple: 3.0
  weak_tail_min_r_multiple: 2.0
  fake_breakout_min_mfe_pct: 0.03
  fake_breakout_min_drawdown_after_mfe_pct: -0.02
  fake_breakout_max_final_pct: 0.005
  late_chase_failure_min_late_chase_risk: 60.0
  late_chase_failure_max_mfe_pct: 0.005
  dumped_min_mae_drop_pct: -0.05
  dumped_max_mfe_pct: 0.01
  stopped_before_tail_pct: -0.04
  missed_tail_min_mfe_pct: 0.05


strategy_validation:
  # Phase 11C.1C-C-B-A - Strategy Validation Lab v0 & Cluster
  # Exposure Control Contracts. The runtime turns Phase 11C.1C-C-A
  # MFE / MAE / tail_label outcomes into per-mode / per-stage /
  # per-bucket cohort stats + per-cluster exposure assessments.
  #
  # Phase 11C.1C-C-B-A boundary: this section is paper / report
  # only. Nothing under it can flip a Phase 1 safety flag, open a
  # private API socket, or call an LLM / Telegram outbound. The
  # ``suggested_cluster_action`` produced by the runtime is a
  # descriptive label; the Risk Engine remains the single
  # trade-decision gate.
  #
  # Phase 11C.1C-C-B-B-A extends this section with the Strategy
  # Validation Dataset Builder & Quality Gate v0 sub-block. The
  # ``quality_gate_*`` thresholds are descriptive: the gate result
  # (``pass`` / ``warn`` / ``fail``) is a label for human review,
  # NOT an input to a trade-decision pipeline. Phase 12 remains
  # FORBIDDEN.
  enabled: true
  max_samples: 2000
  primary_window: "5m"
  overexposure_warning_threshold: 3
  top_symbol_limit: 10
  # Phase 11C.1C-C-B-B-A dataset / quality-gate v0.
  dataset_enabled: true
  quality_gate_min_total_samples: 20
  quality_gate_min_completed_tail_labels: 10
  quality_gate_min_strategy_mode_coverage: 2
  quality_gate_min_candidate_stage_coverage: 2
  quality_gate_min_score_bucket_coverage: 2
  quality_gate_require_export_roundtrip: true
  quality_gate_require_replay_readable: true



live:
  # PR110 - Live Foundation v0 (Live Path Isolation + Runtime Mode
  # Guard + Capital Profile Ladder + Capital Event Contract +
  # Right-tail Leverage Gate + Telegram Operator Contract).
  #
  # PR110 builds the SAFETY FOUNDATION for the move from large-scale
  # cloud blind testing to a 10U small-capital live-preparation posture.
  # It does NOT enable live trading, does NOT connect the Binance
  # private API, does NOT place / cancel orders, and does NOT enable
  # real Telegram outbound.
  #
  # The runtime guard (app/live/runtime_mode.py) ALWAYS boots in
  # LIVE_SHADOW regardless of runtime_mode below, so a config edit can
  # never silently arm LIVE_LIMITED on a restart. capital_profile_id is
  # L0_SHADOW by default (no real orders) and only ever changes by
  # explicit operator action (never auto-escalates).
  runtime_mode: LIVE_SHADOW          # LIVE_SHADOW (空盘跑) | LIVE_LIMITED (有资金跑)
  capital_profile_id: L0_SHADOW      # L0_SHADOW .. L8_10M_CAPITAL_PRESERVATION
  live_limited_confirmation_state: false
  live_limited_armed_at: null
  live_limited_armed_by: null
  kill_switch_armed: false           # stays false until a later PR implements API health checks

  # PR110 foundation feature toggles (on by default).
  live_path_isolation_enabled: true
  capital_profile_ladder_enabled: true
  right_tail_leverage_gate_enabled: true

  # Locked-safe capability flags (the schema refuses to load these True).
  live_trading: false
  exchange_live_orders: false
  binance_private_api_enabled: false
  ai_trade_authority: false
  trade_authority: false
  right_tail_live_boost_enabled: false
  phase_12_forbidden: true
